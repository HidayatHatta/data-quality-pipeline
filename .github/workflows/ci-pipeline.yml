name: Airflow Data Pipeline CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python 3.8
      uses: actions/setup-python@v4
      with:
        python-version: '3.8'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8

    - name: Lint with Flake8 (Cek Kerapian & Syntax Error)
      run: |
        # Menghentikan proses jika ada error syntax fatal (E9, F63, F7, F82)
        flake8 dags/ scripts/ --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Test Python Compilation (Cek Integritas DAG & Scripts)
      run: |
        # Memastikan tidak ada import error yang akan merusak DAG di Airflow
        python -m py_compile dags/*.py
        python -m py_compile scripts/*.py